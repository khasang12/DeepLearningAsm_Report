name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:  # Allow manual trigger

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      - name: Verify build output
        run: |
          echo "Build output in dist/:"
          ls -la dist/
          echo "Checking for required files:"
          ls -la dist/*.html
          test -f dist/index.html && echo "✓ index.html exists"
          test -f dist/assignment1.html && echo "✓ assignment1.html exists"
          test -f dist/assignment2.html && echo "✓ assignment2.html exists"
          test -f dist/styles.css && echo "✓ styles.css exists"
          test -f dist/_config.yml && echo "✓ _config.yml exists"
          test -f dist/.nojekyll && echo "✓ .nojekyll exists"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4